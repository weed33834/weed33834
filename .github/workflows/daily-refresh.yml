name: Daily Refresh

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Regenerate daily SVGs
        run: python3 scripts/gen_assets.py || true

      - name: Show generated files
        run: |
          ls -lh assets/
          echo "--- quote.svg ---"
          head -c 300 assets/quote.svg
          echo ""
          echo "--- onthisday.svg ---"
          head -c 300 assets/onthisday.svg

      - name: Commit to GitHub
        run: |
          git add assets/quote.svg assets/onthisday.svg
          if git diff --cached --quiet; then
            echo "no changes"
          else
            git commit -m "chore: 每日刷新一言 + 历史上的今天 [skip ci]"
            # 先 rebase 远端最新(防止 push 被拒),再 push
            git pull --rebase origin main || git rebase --abort
            git push || { git fetch origin && git rebase origin/main && git push; }
          fi

      - name: Sync to GitCode
        env:
          GITCODE_TOKEN: ${{ secrets.GITCODE_TOKEN }}
        run: |
          if [ -z "$GITCODE_TOKEN" ]; then
            echo "GITCODE_TOKEN not set, skip"
            exit 0
          fi
          git remote add gitcode "https://badhope:${GITCODE_TOKEN}@gitcode.com/badhope/badhope.git" 2>/dev/null || true
          git push --force gitcode main

      - name: Health check
        if: always()
        run: |
          echo "=== commit log ==="
          git log --oneline -3
          echo ""
          echo "=== assets check ==="
          for f in assets/*.svg; do
            if grep -q "</svg>" "$f"; then
              echo "OK: $f"
            else
              echo "FAIL: $f not closed"
            fi
          done
